<!DOCTYPE html>
<html lang="es" data-theme="dashboard">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="La Casa del Under">
  <meta property="og:title" content="Hidden Room">
  <meta property="og:description" content="La Casa del Under">
  <meta property="og:image" content="https://hiddenroom.mx/assets/img/social_preview.webp">
  <meta property="og:url" content="https://hiddenroom.mx/portal/dashboard.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Hidden Room">
  <meta name="twitter:description" content="La Casa del Under">
  <meta name="twitter:image" content="https://hiddenroom.mx/assets/img/social_preview.webp">
  <title>Hidden Room</title>

  <link rel="icon" type="image/webp" href="/assets/img/orange_logo.webp" />

  <!-- Global design system -->
  <link rel="stylesheet" href="../styles.css?v=20260618-navaccordion" />
  <!-- Dashboard-specific layer (additive only, never overrides tokens) -->
  <link rel="stylesheet" href="dashboard.css?v=20260616-membership-delivery-status" />

  <!-- Typefaces (same stack as global) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet" />
</head>

<body class="db-body" data-hr-chrome data-hr-context="portal" data-hr-footer="false">
  <div id="hr-global-nav"></div>

  <!-- ═══════════════════════════════════════════════════
       CUSTOM CURSOR  (inherited from global site.js)
  ═══════════════════════════════════════════════════ -->
  <div id="cursor"     class="cursor"      aria-hidden="true"></div>
  <div id="cursorRing" class="cursor-ring" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════════════
       TOPBAR
       Role context + global actions
  ═══════════════════════════════════════════════════ -->
  <!-- ═══════════════════════════════════════════════════
       LAYOUT SHELL
  ═══════════════════════════════════════════════════ -->
  <div class="db-layout">

    <!-- ─────────────────────────────────────────────
         SIDEBAR NAVIGATION
         Visibility of each nav item is toggled by JS
         based on the user's roles array.
    ──────────────────────────────────────────────── -->
    <aside class="db-sidebar" id="js-sidebar" aria-label="Navegación del portal">

      <nav class="db-sidebar__nav" aria-label="Módulos">

        <!-- ── ALWAYS VISIBLE ─────────────────────── -->
        <ul class="db-sidebar__group" role="list" data-group="core">
          <li class="db-sidebar__label" aria-hidden="true">Sistema</li>

          <li>
            <button
              class="db-sidebar__item db-sidebar__item--active"
              data-section="overview"
              aria-current="page"
            >
              <span class="db-icon db-icon--grid"   aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Inicio</span>
            </button>
          </li>
        </ul>

        <!-- ── ROLE: client ───────────────────────── -->
        <ul class="db-sidebar__group" role="list" data-role-gate="client" hidden>
          <li class="db-sidebar__label" aria-hidden="true">Cliente</li>

          <li>
            <button class="db-sidebar__item" data-section="client-downloads">
              <span class="db-icon db-icon--download" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Descargas</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="client-sessions">
              <span class="db-icon db-icon--calendar" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Sesiones</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="client-transactions">
              <span class="db-icon db-icon--receipt" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Transacciones</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="client-contracts">
              <span class="db-icon db-icon--doc" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Contratos</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="client-membership">
              <span class="db-icon db-icon--star" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Membresía</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="client-tickets">
              <span class="db-icon db-icon--ticket" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Tickets</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="client-store">
              <span class="db-icon db-icon--bag" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Tienda</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="client-rewards">
              <span class="db-icon db-icon--star" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Premios</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-sidebar-action="minigames">
              <span class="db-icon db-icon--grid" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Minijuegos</span>
            </button>
          </li>
        </ul>

        <!-- ── ROLE: collaborator ─────────────────── -->
        <ul class="db-sidebar__group" role="list" data-role-gate="collaborator" hidden>
          <li class="db-sidebar__label" aria-hidden="true">Colaborador</li>

          <li>
            <button class="db-sidebar__item" data-section="collab-docs">
              <span class="db-icon db-icon--folder" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Documentos/Contratos</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="collab-finance">
              <span class="db-icon db-icon--receipt" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Financiero</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="collab-tasks">
              <span class="db-icon db-icon--check" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">SCRUM / Tareas</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="collab-log">
              <span class="db-icon db-icon--activity" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Actividad</span>
            </button>
          </li>
          <li>
            <a class="db-sidebar__item" href="../tickets">
              <span class="db-icon db-icon--check" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Boletera</span>
            </a>
          </li>
        </ul>

        <!-- ── ROLE: rrpp ─────────────────────────── -->
        <ul class="db-sidebar__group" role="list" data-role-gate="pr" hidden>
          <li class="db-sidebar__label" aria-hidden="true">Embajador</li>

          <li>
            <button class="db-sidebar__item" data-section="rrpp-contacts">
              <span class="db-icon db-icon--users" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Boletos vendidos</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="rrpp-invitations">
              <span class="db-icon db-icon--mail" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Invitaciones</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="rrpp-campaigns">
              <span class="db-icon db-icon--broadcast" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Campañas</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="rrpp-guestlist">
              <span class="db-icon db-icon--list" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Lista de invitados</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="rrpp-benefits">
              <span class="db-icon db-icon--gift" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Beneficios</span>
            </button>
          </li>
        </ul>

        <!-- ── ROLE: admin (future) ───────────────── -->
        <ul class="db-sidebar__group" role="list" data-permission-gate="media.posts" hidden>
          <li class="db-sidebar__label" aria-hidden="true">Media</li>
          <li>
            <a class="db-sidebar__item" href="../media/admin.html?view=posts">
              <span class="db-icon db-icon--doc" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Publicaciones</span>
            </a>
          </li>
          <li>
            <a class="db-sidebar__item" href="../media/admin.html?view=editor">
              <span class="db-icon db-icon--activity" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Crear publicación</span>
            </a>
          </li>
          <li>
            <a class="db-sidebar__item" href="../media/admin.html?view=drafts">
              <span class="db-icon db-icon--folder" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Borradores</span>
            </a>
          </li>
        </ul>

        <ul class="db-sidebar__group" role="list" data-role-gate="admin" hidden>
          <li class="db-sidebar__label" aria-hidden="true">ERP — Operaciones</li>

          <li>
            <button class="db-sidebar__item" data-section="erp-finance">
              <span class="db-icon db-icon--chart" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Finanzas</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="erp-ops">
              <span class="db-icon db-icon--settings" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Operaciones</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="erp-permissions">
              <span class="db-icon db-icon--users" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Permisos</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="erp-auth-audit">
              <span class="db-icon db-icon--activity" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Auth / Registros</span>
            </button>
          </li>
          <li>
            <a class="db-sidebar__item" href="../tickets/">
              <span class="db-icon db-icon--gift" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Boletera</span>
            </a>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="admin-table-editor">
              <span class="db-icon db-icon--settings" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">BB.DD</span>
            </button>
          </li>
        </ul>

        <ul class="db-sidebar__group db-sidebar__group--account" role="list">
          <li class="db-sidebar__label" aria-hidden="true">Cuenta</li>
          <li>
            <button class="db-sidebar__item" data-sidebar-action="profile">
              <span class="db-icon db-icon--users" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Perfil</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item" data-section="account-settings">
              <span class="db-icon db-icon--settings" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Ajustes</span>
            </button>
          </li>
          <li>
            <button class="db-sidebar__item db-sidebar__item--danger" data-sidebar-action="logout">
              <span class="db-icon db-icon--settings" aria-hidden="true"></span>
              <span class="db-sidebar__item-text">Cerrar sesión</span>
            </button>
          </li>
        </ul>

      </nav>

      <!-- Sidebar footer: version stamp -->
      <footer class="db-sidebar__footer" aria-label="Meta del sistema">
        <span class="db-sidebar__version" id="js-build-stamp">Una Marca de Grupo Mysauth - <span class="site-status"></span> <span class="site-version"></span></span>
      </footer>

    </aside>


    <!-- ─────────────────────────────────────────────
         MAIN CONTENT AREA
         All sections are injected here by dashboard.js.
         Only one section is visible at a time.
    ──────────────────────────────────────────────── -->
    <main class="db-main" id="js-main" aria-live="polite" aria-label="Contenido del módulo activo">

      <!-- ── SECTION CONTAINER ──
           Each section panel is rendered here.
           JS injects content; transitions handled by CSS classes.
      -->
      <div class="db-section-wrap" id="js-section-wrap">
        <!-- Content injected by dashboard.js -->

        <!-- Loading skeleton (shown before first render) -->
        <div class="db-skeleton" id="js-skeleton" aria-label="Cargando módulo" role="status">
          <span class="db-skeleton__line db-skeleton__line--wide"></span>
          <span class="db-skeleton__line db-skeleton__line--mid"></span>
          <span class="db-skeleton__line db-skeleton__line--narrow"></span>
        </div>
      </div>

    </main>

    <!-- ── NOTIFICATIONS PANEL ──
         Flex sibling of main inside .db-layout.
         Width animates open/closed via CSS; JS toggles [hidden].
    -->
    <aside
      class="db-notifications"
      id="js-notifications-panel"
      aria-label="Notificaciones"
      hidden
    >
      <header class="db-notifications__header">
        <span class="section-label">Notificaciones</span>
        <button class="db-icon-btn" id="js-notif-close" aria-label="Cerrar panel">✕</button>
      </header>
      <ul class="db-notifications__list" id="js-notif-list" role="list">
        <!-- Injected by JS -->
      </ul>
    </aside>

  </div><!-- /.db-layout -->


  <!-- ═══════════════════════════════════════════════════
       TOAST SYSTEM  (global, fixed position)
  ═══════════════════════════════════════════════════ -->
  <div class="db-toast-region" id="js-toast-region" aria-live="assertive" aria-atomic="true"></div>


  <!-- ═══════════════════════════════════════════════════
       SCRIPTS
       Load order matters — router last.
  ═══════════════════════════════════════════════════ -->
  <!-- Global behavior (cursor, reveal, etc.) -->
  <script src="../site.js?v=20260618-navaccordion" defer></script>

  <!-- Dashboard controller / router -->
  <script src="dashboard.js?v=20260618-navaccordion" type="module"></script>

  <!--
    Cursor hover patch — site.js binds mouseenter/mouseleave with querySelectorAll
    which only catches elements present at load time. The dashboard is a SPA so
    sections are replaced via innerHTML. This delegation re-implements the hover
    effect on document so it survives every re-render.
  -->
</body>
</html>
