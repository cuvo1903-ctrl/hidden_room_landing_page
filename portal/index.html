<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="La Casa del Under">
  <meta property="og:title" content="Hidden Room">
  <meta property="og:description" content="La Casa del Under">
  <meta property="og:image" content="https://hiddenroom.mx/assets/img/social_preview.webp">
  <meta property="og:url" content="https://hiddenroom.mx/portal/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Hidden Room">
  <meta name="twitter:description" content="La Casa del Under">
  <meta name="twitter:image" content="https://hiddenroom.mx/assets/img/social_preview.webp">
  <title>Hidden Room</title>
  <link rel="icon" type="image/webp" href="/assets/img/orange_logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Unbounded:wght@200;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css?v=20260618-navfix">
  <link rel="stylesheet" href="login.css">
</head>
<body data-hr-chrome data-hr-context="portal">
  <div id="hr-global-nav"></div>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <main class="login-page">

    <div class="login-card">

      <div class="login-logo">
        <img src="../assets/img/white_logo.webp" alt="Hidden Room" class="img-logo">
      </div>

      <p class="login-eyebrow">La Casa del Under</p>

      <h1 class="login-title">Inicia<br>Sesión</h1>

      <form class="login-form" id="login-form" novalidate>

        <div class="login-field">
          <label class="login-label" for="usuario">Correo</label>
          <input
            class="login-input"
            id="usuario"
            type="email"
            name="usuario"
            placeholder="Correo"
            autocomplete="email"
            required
          >
        </div>

        <div class="login-field">
          <label class="login-label" for="password">Contraseña</label>
          <input
            class="login-input"
            id="password"
            type="password"
            name="password"
            placeholder="Contraseña"
            autocomplete="current-password"
            required
          >
        </div>

        <a href="#" class="login-forgot">ENLAZADO CON MYSAUTH OS</a>

        <p class="login-important">
          Si has USADO nuestros productos PREVIAMENTE tu registro fue generado por Kairen en automático.
          <a id="js-password-reset" href="#">SOLICITA</a> un email con tu contraseña.
        </p>

        <button class="login-submit" type="submit">Entrar</button>

      </form>

      <div class="login-divider">
        <span class="login-divider-text">o</span>
      </div>

      <p class="login-register">
        <a href="#" id="js-register-link">Registrarse</a>
      </p>

      <p class="login-version">Una Marca de Grupo Mysauth -
  <span class="site-status"></span>
  <span class="site-version"></span></p>

    </div>

  </main>

<script src="../site.js?v=20260618-navfix"></script>
<script type="module" src="login.js"></script>
</body>
</html>
