<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>flappy ñero</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="game.css">
</head>
<body>

<div id="wrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="scanlines"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="score-display">
      PUNTOS <span id="scoreVal">0</span><br>
      RECORD &nbsp;<span id="bestVal">0</span>
    </div>
    <div id="lives-display">
      VIDAS <span id="livesVal">///</span>
    </div>
  </div>

  <!-- Coupon toast -->
  <div id="coupon-toast"></div>

  <!-- Start screen -->
  <div class="screen" id="startScreen">
    <div class="screen-label">hidden room presenta</div>
    <div class="screen-title">FLAPPY ÑERO (beta)</div>
    <div class="screen-sub">salva a los DEM00NZ de las calles del edomex T.T.<br>consigue cupones para hidden :*.</div>
    <button class="btn" id="startBtn">SÁLELE BEBÉ</button>
    <div style="margin-top:20px;font-size:10px;letter-spacing:0.2em;color:var(--muted);">
      picale / espacio / ↑ &nbsp;para saltar
    </div>
  </div>

  <!-- Game over screen -->
  <div class="screen hidden" id="gameOverScreen">
    <div class="screen-label">chingó a su madre</div>
    <div class="screen-title">te moriste</div>
    <div class="screen-stat">puntos &nbsp;<strong id="goScore">0</strong></div>
    <div class="screen-stat">record &nbsp;&nbsp;<strong id="goBest">0</strong></div>
    <div class="screen-stat" id="goCoupons" style="color:var(--coupon)"></div>
    <button class="btn" id="restartBtn">vuelve a jugar</button>
  </div>

  <div id="tap-hint">activa tu audio pa mejor experiencia</div>
</div>

<script src="endless_edomex.js"></script>
</body>
</html>
