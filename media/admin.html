<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>MEDIA Admin — Hidden Room</title>
  <link rel="icon" type="image/webp" href="/assets/img/orange_logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="./admin.css">
</head>
<body class="media-admin" data-hr-chrome data-hr-context="media" data-hr-accent="media">
  <header class="media-admin__topbar">
    <a href="/portal/dashboard.html" class="media-admin__brand">
      <img src="../assets/img/white_logo.webp" alt="Hidden Room">
      <span>MEDIA / CMS</span>
    </a>
    <div class="media-admin__top-actions">
      <a href="/media/" target="_blank" rel="noopener">Ver sitio</a>
      <button id="logout-button" type="button">Cerrar sesión</button>
    </div>
  </header>

  <div class="media-admin__layout">
    <aside class="media-admin__sidebar">
      <p>Contenido</p>
      <nav aria-label="Administración Media">
        <a href="?view=posts" data-admin-view="posts">Publicaciones</a>
        <a href="?view=editor" data-admin-view="editor">Crear publicación</a>
        <a href="?view=drafts" data-admin-view="drafts">Borradores</a>
      </nav>
      <a class="media-admin__back" href="/portal/dashboard.html">← Dashboard</a>
    </aside>

    <main class="media-admin__main">
      <div id="admin-status" class="admin-status" role="status">Validando acceso…</div>

      <section id="list-view" class="admin-view" hidden>
        <header class="admin-heading">
          <div><span>MEDIA</span><h1 id="list-title">Publicaciones</h1></div>
          <a class="admin-primary" href="?view=editor">Nueva publicación</a>
        </header>
        <div class="admin-list-toolbar">
          <input id="admin-search" type="search" placeholder="Buscar por título, autor o categoría">
          <select id="admin-status-filter">
            <option value="">Todos los estados</option>
            <option value="published">Publicados</option>
            <option value="draft">Borradores</option>
            <option value="archived">Archivados</option>
          </select>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>Publicación</th><th>Estado</th><th>Fecha</th><th>Vistas</th><th>Acciones</th></tr></thead>
            <tbody id="posts-table-body"></tbody>
          </table>
        </div>
      </section>

      <section id="editor-view" class="admin-view" hidden>
        <header class="admin-heading">
          <div><span>EDITOR</span><h1 id="editor-title">Crear publicación</h1></div>
          <a class="admin-secondary" href="?view=posts">Cancelar</a>
        </header>

        <form id="post-form" class="editor-form">
          <input id="post-id" type="hidden">
          <div class="editor-grid">
            <div class="editor-main">
              <label class="admin-field">
                <span>Título</span>
                <input id="post-title-input" name="title" required maxlength="180" placeholder="Título de la publicación">
              </label>
              <label class="admin-field">
                <span>Slug</span>
                <div class="slug-field"><span>hiddenroom.mx/media/</span><input id="post-slug" name="slug" required maxlength="120"></div>
              </label>
              <label class="admin-field">
                <span>Extracto / Meta description</span>
                <textarea id="post-excerpt-input" name="excerpt" maxlength="280" rows="4" placeholder="Resumen breve para tarjetas, buscadores y redes"></textarea>
                <small><b id="excerpt-count">0</b>/280</small>
              </label>

              <div class="admin-field">
                <span>Contenido</span>
                <div class="editor-toolbar" aria-label="Herramientas del editor">
                  <button type="button" data-command="formatBlock" data-value="h2">H2</button>
                  <button type="button" data-command="formatBlock" data-value="h3">H3</button>
                  <button type="button" data-command="bold"><strong>B</strong></button>
                  <button type="button" data-command="italic"><em>I</em></button>
                  <button type="button" data-command="insertUnorderedList">• Lista</button>
                  <button type="button" data-command="formatBlock" data-value="blockquote">Cita</button>
                  <button type="button" data-editor-action="link">Link</button>
                  <button type="button" data-command="removeFormat">Limpiar</button>
                </div>
                <div id="post-content-editor" class="content-editor" contenteditable="true" role="textbox" aria-multiline="true" data-placeholder="Escribe la historia completa…"></div>
              </div>
            </div>

            <aside class="editor-side">
              <label class="admin-field">
                <span>Categoría</span>
                <select id="post-category-input" name="category" required></select>
              </label>
              <label class="admin-field">
                <span>Tags</span>
                <input id="post-tags" name="tags" placeholder="rap, cdmx, live session">
                <small>Separados por comas.</small>
              </label>
              <label class="admin-field">
                <span>Autor visible</span>
                <input id="post-author-name" name="author_name" maxlength="100">
              </label>
              <label class="admin-field">
                <span>Imagen de portada</span>
                <input id="post-cover-file" type="file" accept="image/jpeg,image/png,image/webp,image/gif">
                <input id="post-cover-url" name="cover_image" type="url" placeholder="https://…">
              </label>
              <div id="cover-preview" class="cover-preview">Sin portada</div>
              <label class="admin-check"><input id="post-featured" name="featured" type="checkbox"><span>Destacar publicación</span></label>
              <div class="editor-actions">
                <button class="admin-secondary" type="submit" data-save-status="draft">Guardar borrador</button>
                <button class="admin-primary" type="submit" data-save-status="published">Publicar</button>
                <button class="admin-ghost" id="preview-button" type="button">Vista previa</button>
              </div>
            </aside>
          </div>
        </form>
      </section>
    </main>
  </div>

  <dialog id="preview-dialog" class="preview-dialog">
    <button id="preview-close" class="preview-close" type="button">Cerrar</button>
    <article>
      <p id="preview-category"></p>
      <h1 id="preview-title"></h1>
      <p id="preview-excerpt"></p>
      <img id="preview-cover" alt="" hidden>
      <div id="preview-content" class="post-content"></div>
    </article>
  </dialog>

  <div id="admin-toast" class="admin-toast" role="status" hidden></div>
  <script src="../site.js"></script>
  <script type="module" src="./admin.js"></script>
</body>
</html>
