<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hidden Room Media">
  <meta property="og:title" content="Hidden Room Media">
  <meta property="og:description" content="La voz de la cultura underground.">
  <meta property="og:image" content="https://hiddenroom.mx/assets/img/social_preview.webp">
  <meta property="og:url" content="https://hiddenroom.mx/media/post.html">
  <meta property="og:type" content="article">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://hiddenroom.mx/media/post.html">
  <title>Hidden Room Media</title>
  <link rel="icon" type="image/webp" href="/assets/img/orange_logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css?v=20260620-media-public">
  <link rel="stylesheet" href="./media.css?v=20260620-media-public">
  <script id="article-jsonld" type="application/ld+json">{}</script>
</head>
<body class="media-body post-page hr-page" data-hr-chrome data-hr-context="media" data-hr-accent="media">
  <div id="hr-global-nav"></div>
  <div class="cursor" id="cursor" aria-hidden="true"></div>
  <div class="cursor-ring" id="cursorRing" aria-hidden="true"></div>

  <main id="post-main">
    <div id="post-status" class="post-loading hr-muted" role="status">Cargando artículo…</div>
    <article id="post-article" class="post-article" hidden>
      <header class="post-header hr-container hr-stack">
        <a id="post-category" class="post-category hr-kicker" href="/media/"></a>
        <h1 id="post-title" class="hr-title-xl"></h1>
        <p id="post-excerpt" class="post-excerpt hr-subtitle"></p>
        <div class="post-meta hr-cluster">
          <span id="post-author"></span>
          <time id="post-date"></time>
          <span id="post-views"></span>
        </div>
      </header>
      <figure id="post-cover-wrap" class="post-cover" hidden>
        <img id="post-cover" alt="">
      </figure>
      <div id="post-content" class="post-content hr-body"></div>
      <footer class="post-footer hr-stack">
        <div id="post-tags" class="post-tags hr-cluster"></div>
        <div class="post-share hr-cluster" aria-label="Compartir artículo">
          <span>Compartir</span>
          <a id="share-x" class="hr-btn hr-btn-ghost hr-btn-sm" target="_blank" rel="noopener noreferrer">X</a>
          <a id="share-facebook" class="hr-btn hr-btn-ghost hr-btn-sm" target="_blank" rel="noopener noreferrer">Facebook</a>
          <a id="share-whatsapp" class="hr-btn hr-btn-ghost hr-btn-sm" target="_blank" rel="noopener noreferrer">WhatsApp</a>
          <button id="share-copy" class="hr-btn hr-btn-ghost hr-btn-sm" type="button">Copiar link</button>
        </div>
      </footer>
    </article>

    <section id="related-section" class="related-section hr-section" hidden>
      <div class="hr-container hr-stack hr-stack-xl">
      <div class="media-section-heading hr-cluster"><span>03</span><h2 class="hr-section-title">También en el archivo</h2></div>
      <div id="related-grid" class="posts-grid hr-card-grid"></div>
      </div>
    </section>
  </main>

  <footer class="media-footer">
    <img src="../assets/img/white_logo.webp" alt="Hidden Room">
    <p>La casa del under · México</p>
  </footer>

  <script src="../site.js?v=20260618-mobileauth"></script>
  <script type="module" src="./post.js"></script>
</body>
</html>
