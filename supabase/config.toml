
[functions.kairen-gemini]
enabled = true
verify_jwt = false
import_map = "./functions/kairen-gemini/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/kairen-gemini/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/kairen-chat/*.html" ]

[functions.create-checkout-session]
enabled = true
# Checkout es público; la función valida catálogo, cantidades y precios.
verify_jwt = false
entrypoint = "./functions/create-checkout-session/index.ts"

[functions.stripe-webhook]
enabled = true
verify_jwt = false
entrypoint = "./functions/stripe-webhook/index.ts"

[functions.create-order]
enabled = true
# Checkout es publico; la funcion valida catalogo, cantidades y precios.
verify_jwt = false
entrypoint = "./functions/create-order/index.ts"

[functions.mercadopago-webhook]
enabled = true
verify_jwt = false
entrypoint = "./functions/mercadopago-webhook/index.ts"

[functions.server-status]
enabled = true
verify_jwt = false
entrypoint = "./functions/server-status/index.ts"

[functions.ig-list-media]
enabled = true
verify_jwt = false
entrypoint = "./functions/ig-list-media/index.ts"

[functions.ig-analyze-comments]
enabled = true
verify_jwt = false
entrypoint = "./functions/ig-analyze-comments/index.ts"

[functions.analyze-beat-audio]
enabled = true
# Admin-only. Forwards audio to the private Debian Essentia analyzer.
verify_jwt = false
entrypoint = "./functions/analyze-beat-audio/index.ts"
